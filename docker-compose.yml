services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blackjack-tma
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      SQLITE_PATH: /app/database/blackjack.sqlite
    volumes:
      - blackjack_data:/app/database
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  blackjack_data:
